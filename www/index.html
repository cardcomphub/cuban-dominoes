<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cuban Dominoes</title>
    <style>
        :root {
            --felt: #1a472a;
            --tile-bg: #f5f5dc;
            --tile-dot: #111;
            --highlight: #ffd700;
            --team1-color: #4da6ff;
            --team2-color: #ff6666;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--felt);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh; /* Fallback */
            height: 100dvh; /* FIXED: Adapts to mobile browser URL bars */
            overflow: hidden;
            overscroll-behavior-y: none; /* FIXED: Prevents pull-to-refresh on mobile */
        }

        #header {
            text-align: center;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            flex-shrink: 0;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            z-index: 10;
        }

        #scoreboard {
            display: flex;
            justify-content: center;
            flex-wrap: wrap; /* FIXED: Allows teams to stack cleanly on narrow screens */
            gap: 15px;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .t1-box, .t2-box {
            white-space: nowrap; /* FIXED: Stops the score number from wrapping to a new line */
        }

        .t1-box {
            color: var(--team1-color);
        }

        .t2-box {
            color: var(--team2-color);
        }

        #board-container {
            flex-grow: 1;
            min-height: 0;
            display: block;
            overflow: auto;
            padding: 20px;
            box-sizing: border-box;
            position: relative;
            scroll-behavior: smooth;
        }

        #the-board {
            position: relative;
            width: 100%;
            height: 100%;
            margin: 0;
        }

        #hand-container {
            height: 120px;
            flex-shrink: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            gap: 10px;
            padding: 10px;
            overflow-x: auto;
            align-items: center;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.5);
            z-index: 10;
        }

        @keyframes snapIn {
            0% {
                transform: scale(1.5) translateY(-30px);
                opacity: 0;
                box-shadow: 10px 10px 20px rgba(0,0,0,0.8);
            }

            100% {
                transform: scale(1) translateY(0);
                opacity: 1;
                box-shadow: 2px 2px 5px rgba(0,0,0,0.5);
            }
        }

        .domino {
            background-color: var(--tile-bg);
            border-radius: 8px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            flex-shrink: 0;
        }

        #hand-container .domino {
            transition: transform 0.2s, margin 0.3s ease;
        }

        #the-board .domino {
            animation: snapIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .domino.vertical {
            width: 50px;
            height: 100px;
        }

        .domino.horizontal {
            flex-direction: row;
            width: 100px;
            height: 50px;
        }

            .domino.horizontal.double-tile {
                flex-direction: column;
                width: 50px;
                height: 100px;
            }

        .divider {
            background-color: #333;
        }

        .vertical .divider {
            width: 80%;
            height: 2px;
            margin: 5px 0;
        }

        .horizontal .divider {
            height: 80%;
            width: 2px;
            margin: 0 5px;
        }

        .pip-face {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            width: 100%;
            height: 100%;
            padding: 5px;
            box-sizing: border-box;
        }

        .dot {
            width: 8px;
            height: 8px;
            background-color: var(--tile-dot);
            border-radius: 50%;
            justify-self: center;
            align-self: center;
        }

        .playable {
            border: 3px solid var(--highlight);
            transform: translateY(-8px);
        }

            .playable:hover {
                transform: translateY(-12px) scale(1.05);
            }

        button {
            padding: 8px 16px;
            background-color: var(--highlight);
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

            button:active {
                transform: scale(0.95);
            }

        #round-modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(0, 0, 0, 0.95);
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            border: 3px solid var(--highlight);
            z-index: 100;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
            width: 80%;
            max-width: 400px;
        }
    </style>
</head>
<body>

    <div id="header">
        <div id="scoreboard">
            <span class="t1-box">Team 1 (P0, P2): <span id="score-t1">0</span></span>
            <span class="t2-box">Team 2 (P1, P3): <span id="score-t2">0</span></span>
        </div>
        <div id="status-text">Connecting...</div>
        <button id="pass-btn" style="display: none; margin-top:5px;" onclick="passTurn()">Pass (Knock)</button>
    </div>

    <div id="board-container">
        <div id="the-board"></div>
    </div>

    <div id="round-modal">
        <h2 id="modal-title">Round Over!</h2>
        <p id="modal-msg" style="font-size: 18px; margin-bottom: 20px; white-space: pre-line;"></p>
        <button id="next-round-btn" onclick="requestNextRound()">Deal Next Hand</button>
    </div>

    <div id="hand-container"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myPlayerIndex = null;
        let myHand = [];
        let isMyTurn = false;
        let currentBoard = [];
        let boardEnds = { head: null, tail: null };
        let previousBoardLength = 0;

        // --- SOUND ENGINE (Web Audio API) ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();

        function playWoodClack() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.6, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        function playVictoryChime() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            [523.25, 659.25, 783.99].forEach((freq, i) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(0, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + 0.1);
                gain.gain.setTargetAtTime(0, audioCtx.currentTime + 0.1, 0.3);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(audioCtx.currentTime + (i * 0.1));
                osc.stop(audioCtx.currentTime + 2);
            });
        }
        // -------------------------------------

        const dotPatterns = {
            0: [], 1: [5], 2: [1, 9], 3: [1, 5, 9], 4: [1, 3, 7, 9],
            5: [1, 3, 5, 7, 9], 6: [1, 3, 4, 6, 7, 9], 7: [1, 3, 4, 5, 6, 7, 9],
            8: [1, 2, 3, 4, 6, 7, 8, 9], 9: [1, 2, 3, 4, 5, 6, 7, 8, 9]
        };

        socket.on('game_update', (state) => {
            myPlayerIndex = state.playerIndex;
            myHand = state.hand;
            isMyTurn = (state.currentTurn === myPlayerIndex);
            currentBoard = state.board;

            if (currentBoard.length > previousBoardLength) {
                playWoodClack();
            }
            previousBoardLength = currentBoard.length;

            if (currentBoard.length > 0) {
                boardEnds.head = currentBoard[0][0];
                boardEnds.tail = currentBoard[currentBoard.length - 1][1];
            }

            document.getElementById('score-t1').innerText = state.scores.team1;
            document.getElementById('score-t2').innerText = state.scores.team2;

            const myTeamClass = (myPlayerIndex === 0 || myPlayerIndex === 2) ? "t1-box" : "t2-box";
            const myTeamNum = (myPlayerIndex === 0 || myPlayerIndex === 2) ? 1 : 2;

            const statusText = document.getElementById('status-text');
            const passBtn = document.getElementById('pass-btn');
            const modal = document.getElementById('round-modal');

            if (state.matchWinner) {
                if (modal.style.display !== 'block') playVictoryChime();
                modal.style.display = 'block';
                document.getElementById('modal-title').innerText = "🏆 GAME OVER 🏆";
                document.getElementById('modal-msg').innerText = state.matchWinner + "\n(Loser reached 200 points)";
                document.getElementById('next-round-btn').style.display = 'none';
                passBtn.style.display = "none";
                statusText.innerText = "Match Concluded.";
            } else if (state.isRoundOver) {
                if (modal.style.display !== 'block') playVictoryChime();
                modal.style.display = 'block';
                document.getElementById('modal-title').innerText = "Round Over!";
                document.getElementById('modal-msg').innerText = state.roundMessage;
                passBtn.style.display = "none";
                statusText.innerText = "Waiting for next round...";
            } else {
                modal.style.display = 'none';
                if (isMyTurn) {
                    statusText.innerHTML = `You are Player ${myPlayerIndex} (<span class="${myTeamClass}">Team ${myTeamNum}</span>) - YOUR TURN!`;
                    passBtn.style.display = "inline-block";
                } else {
                    statusText.innerHTML = `You are Player ${myPlayerIndex} (<span class="${myTeamClass}">Team ${myTeamNum}</span>) - Waiting for Player ${state.currentTurn}...`;
                    passBtn.style.display = "none";
                }
            }
            renderHand();
            renderBoard(currentBoard);
        });

        socket.on('error_msg', (msg) => { alert(msg); });

        function renderHand() {
            const handContainer = document.getElementById('hand-container');
            handContainer.innerHTML = '';
            myHand.forEach((tile, index) => {
                const dominoEl = createDominoElement(tile, 'vertical');
                if (isMyTurn) dominoEl.classList.add('playable');

                dominoEl.onclick = () => {
                    if (!isMyTurn) return;

                    if (audioCtx.state === 'suspended') audioCtx.resume();

                    if (currentBoard.length === 0) {
                        socket.emit('play_tile', { playerIndex: myPlayerIndex, tileIndex: index, target: 'tail' });
                        return;
                    }
                    const [a, b] = tile;
                    const matchesHead = (a === boardEnds.head || b === boardEnds.head);
                    const matchesTail = (a === boardEnds.tail || b === boardEnds.tail);

                    if (matchesHead && matchesTail) {
                        const playOnHead = confirm("This tile matches BOTH sides!\n\nClick OK to play on the LEFT (Head).\nClick Cancel to play on the RIGHT (Tail).");
                        const targetEnd = playOnHead ? 'head' : 'tail';
                        socket.emit('play_tile', { playerIndex: myPlayerIndex, tileIndex: index, target: targetEnd });
                    } else if (matchesHead) {
                        socket.emit('play_tile', { playerIndex: myPlayerIndex, tileIndex: index, target: 'head' });
                    } else if (matchesTail) {
                        socket.emit('play_tile', { playerIndex: myPlayerIndex, tileIndex: index, target: 'tail' });
                    }
                };
                handContainer.appendChild(dominoEl);
            });
        }

        // PERFECTED: Mobile-Safe 1-Pass Continuous Snaking Engine
        function renderBoard(boardTiles) {
            const boardContainer = document.getElementById('the-board');
            const scrollContainer = document.getElementById('board-container');
            boardContainer.innerHTML = '';

            if (boardTiles.length === 0) return;

            const GAP = 4;
            const ROW_H = 85;
            const TILES_PER_ROW = 10;

            let positions = [];
            let cx = 0, cy = 0, dir = 1;

            for (let i = 0; i < boardTiles.length; i++) {
                let tile = boardTiles[i];
                let isDouble = (tile[0] === tile[1]);
                let w = isDouble ? 50 : 100;

                if (i > 0) {
                    if (i % TILES_PER_ROW === 0) {
                        cy += ROW_H;
                        dir *= -1;
                    } else {
                        cx += dir * GAP;
                    }
                }

                let drawX;
                let flip;
                if (dir === 1) {
                    drawX = cx;
                    cx += w;
                    flip = false;
                } else {
                    cx -= w;
                    drawX = cx;
                    flip = true;
                }

                positions.push({ tile, x: drawX, y: cy, flip, isDouble });
            }

            let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
            positions.forEach(pos => {
                let w = pos.isDouble ? 50 : 100;
                let h = pos.isDouble ? 100 : 50;

                if (pos.x < minX) minX = pos.x;
                if (pos.x + w > maxX) maxX = pos.x + w;

                let topY = pos.isDouble ? pos.y - 25 : pos.y;
                let botY = topY + h;

                if (topY < minY) minY = topY;
                if (botY > maxY) maxY = botY;
            });

            const containerWidth = scrollContainer.clientWidth;
            const containerHeight = scrollContainer.clientHeight;

            let totalW = maxX - minX;
            let totalH = maxY - minY;

            // FIXED: Never allow offsets to push tiles into negative pixels (which hides them off-screen)
            let offsetX = 20 - minX;
            if (totalW < containerWidth - 40) {
                offsetX = (containerWidth - totalW) / 2 - minX; // Center if it fits
            }

            let offsetY = 20 - minY;
            if (totalH < containerHeight - 40) {
                offsetY = (containerHeight - totalH) / 2 - minY; // Center if it fits
            }

            positions.forEach(pos => {
                const dominoEl = createDominoElement(pos.tile, 'horizontal', pos.flip);
                dominoEl.style.position = 'absolute';
                dominoEl.style.left = `${pos.x + offsetX}px`;

                let finalY = pos.y + offsetY;
                if (pos.isDouble) finalY -= 25;

                dominoEl.style.top = `${finalY}px`;
                boardContainer.appendChild(dominoEl);
            });

            // FIXED: Expand background scrolling area so the user can swipe to see everything
            boardContainer.style.minWidth = `${totalW + 40}px`;
            boardContainer.style.minHeight = `${totalH + 40}px`;

            // ANIMATION: Smoothly center the camera on the board
            scrollContainer.scrollTo({
                top: (totalH + 40) / 2 - containerHeight / 2,
                left: (totalW + 40) / 2 - containerWidth / 2,
                behavior: 'smooth'
            });
        }

        function createDominoElement(tile, orientation = 'vertical', flip = false) {
            const div = document.createElement('div');
            div.className = `domino ${orientation}`;

            if (orientation === 'horizontal' && tile[0] === tile[1]) {
                div.classList.add('double-tile');
            }

            function createPipFace(num) {
                const face = document.createElement('div');
                face.className = 'pip-face';
                dotPatterns[num].forEach(pos => {
                    const dot = document.createElement('div');
                    dot.className = 'dot';
                    const row = Math.ceil(pos / 3);
                    const col = ((pos - 1) % 3) + 1;
                    dot.style.gridArea = `${row} / ${col}`;
                    face.appendChild(dot);
                });
                return face;
            }

            const topHalf = createPipFace(flip ? tile[1] : tile[0]);
            const bottomHalf = createPipFace(flip ? tile[0] : tile[1]);

            if (orientation === 'horizontal' && tile[0] === tile[1]) {
                div.appendChild(topHalf);
                div.appendChild(Object.assign(document.createElement('div'), { className: 'divider', style: 'width: 80%; height: 2px; margin: 5px 0;' }));
                div.appendChild(bottomHalf);
            } else {
                div.appendChild(topHalf);
                div.appendChild(Object.assign(document.createElement('div'), { className: 'divider' }));
                div.appendChild(bottomHalf);
            }

            return div;
        }

        function passTurn() {
            if (isMyTurn) {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                socket.emit('pass_turn', { playerIndex: myPlayerIndex });
            }
        }

        function requestNextRound() {
            previousBoardLength = 0;
            socket.emit('next_round');
        }
    </script>
</body>
</html>
