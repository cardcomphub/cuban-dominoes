<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cuban Dominoes</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --felt: #1a472a;
            --tile-bg: #f5f5dc;
            --tile-dot: #111;
            --highlight: #ffd700;
            --team1-color: #4da6ff;
            --team2-color: #ff6666;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--felt);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            overscroll-behavior-y: none;
        }

        /* --- NEW: LOGIN OVERLAY CSS --- */
        #login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--felt);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 300;
        }

        .auth-box {
            background-color: rgba(0,0,0,0.8);
            border: 2px solid var(--highlight);
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .google-btn {
            background-color: white;
            color: #444;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 12px;
            font-size: 16px;
            margin-top: 20px;
            border-radius: 4px;
            cursor: pointer;
            border: none;
            font-weight: bold;
        }
        /* ------------------------------ */

        /* --- LOBBY OVERLAY CSS --- */
        #lobby-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
            display: none; /* Hidden by default until login clears */
        }

        .lobby-box {
            background-color: var(--felt);
            border: 3px solid var(--highlight);
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.2);
            width: 85%;
            max-width: 400px;
        }

            .lobby-box h1 {
                margin-top: 0;
                font-size: 28px;
            }

            .lobby-box p {
                font-size: 16px;
                margin-bottom: 25px;
                color: #ccc;
            }

        .lobby-input {
            width: 100%;
            padding: 12px;
            font-size: 24px;
            text-align: center;
            text-transform: uppercase;
            font-weight: bold;
            border-radius: 8px;
            border: none;
            margin-bottom: 10px;
            box-sizing: border-box;
            letter-spacing: 5px;
        }

        .btn-large {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            margin-bottom: 15px;
        }

        .divider {
            margin: 20px 0;
            border-bottom: 1px solid #555;
            position: relative;
        }

            .divider span {
                position: absolute;
                top: -10px;
                left: 50%;
                transform: translateX(-50%);
                background: var(--felt);
                padding: 0 10px;
                color: #aaa;
                font-size: 14px;
            }

        /* --- GAME CSS --- */
        #header {
            text-align: center;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            flex-shrink: 0;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            z-index: 10;
        }

        #room-info-bar {
            color: var(--highlight);
            font-size: 14px;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        #scoreboard {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .t1-box, .t2-box {
            white-space: nowrap;
        }

        .t1-box {
            color: var(--team1-color);
        }

        .t2-box {
            color: var(--team2-color);
        }

        #board-container {
            flex-grow: 1;
            min-height: 0;
            display: block;
            overflow: auto;
            padding: 20px;
            box-sizing: border-box;
            position: relative;
            scroll-behavior: smooth;
        }

        #the-board {
            position: relative;
            width: 100%;
            height: 100%;
            margin: 0;
        }

        #hand-container {
            height: 120px;
            flex-shrink: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            gap: 10px;
            padding: 10px;
            overflow-x: auto;
            align-items: center;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.5);
            z-index: 10;
        }

        @keyframes snapIn {
            0% {
                transform: scale(1.5) translateY(-30px);
                opacity: 0;
                box-shadow: 10px 10px 20px rgba(0,0,0,0.8);
            }

            100% {
                transform: scale(1) translateY(0);
                opacity: 1;
                box-shadow: 2px 2px 5px rgba(0,0,0,0.5);
            }
        }

        .domino {
            background-color: var(--tile-bg);
            border-radius: 8px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            flex-shrink: 0;
        }

        #hand-container .domino {
            transition: transform 0.2s, margin 0.3s ease;
        }

        #the-board .domino {
            animation: snapIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .domino.vertical {
            width: 50px;
            height: 100px;
        }

        .domino.horizontal {
            flex-direction: row;
            width: 100px;
            height: 50px;
        }

            .domino.horizontal.double-tile {
                flex-direction: column;
                width: 50px;
                height: 100px;
            }

        .divider-line {
            background-color: #333;
        }

        .vertical .divider-line {
            width: 80%;
            height: 2px;
            margin: 5px 0;
        }

        .horizontal .divider-line {
            height: 80%;
            width: 2px;
            margin: 0 5px;
        }

        .pip-face {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            width: 100%;
            height: 100%;
            padding: 5px;
            box-sizing: border-box;
        }

        .dot {
            width: 8px;
            height: 8px;
            background-color: var(--tile-dot);
            border-radius: 50%;
            justify-self: center;
            align-self: center;
        }

        .playable {
            border: 3px solid var(--highlight);
            transform: translateY(-8px);
        }

            .playable:hover {
                transform: translateY(-12px) scale(1.05);
            }

        button {
            padding: 8px 16px;
            background-color: var(--highlight);
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            color: #111;
        }

            button:active {
                transform: scale(0.95);
            }

        #round-modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(0, 0, 0, 0.95);
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            border: 3px solid var(--highlight);
            z-index: 100;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
            width: 80%;
            max-width: 400px;
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="auth-box">
            <h1 style="margin: 0; color: white;">Welcome</h1>
            <p style="color: #aaa;">Sign in to save your stats and play.</p>

            <button class="google-btn" onclick="signInWithGoogle()">
                <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" /><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" /><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" /><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" /><path fill="none" d="M1 1h22v22H1z" /></svg>
                Sign in with Google
            </button>
        </div>
    </div>

    <div id="lobby-screen">
        <div class="lobby-box">
            <h1>Cuban Dominoes</h1>
            <p>Play double-nine with your friends.</p>
            <button class="btn-large" onclick="createRoom()">Create Private Table</button>
            <div class="divider"><span>OR</span></div>
            <input type="text" id="room-code-input" class="lobby-input" placeholder="CODE" maxlength="5">
            <button class="btn-large" style="background-color: #eee;" onclick="joinRoom()">Join Friend's Table</button>
        </div>
    </div>

    <div id="header">
        <div id="room-info-bar" style="display: none;">
            ROOM CODE: <strong id="display-room-code" style="font-size: 18px; color: white;">----</strong>
            | Players: <span id="display-player-count">1</span>/4
        </div>
        <div id="scoreboard">
            <span class="t1-box">Team 1 (P0, P2): <span id="score-t1">0</span></span>
            <span class="t2-box">Team 2 (P1, P3): <span id="score-t2">0</span></span>
        </div>
        <div id="status-text">Waiting in lobby...</div>
        <button id="pass-btn" style="display: none; margin-top:5px;" onclick="passTurn()">Pass (Knock)</button>
    </div>

    <div id="board-container">
        <div id="the-board"></div>
    </div>

    <div id="round-modal">
        <h2 id="modal-title">Round Over!</h2>
        <p id="modal-msg" style="font-size: 18px; margin-bottom: 20px; white-space: pre-line;"></p>
        <button id="next-round-btn" onclick="requestNextRound()">Deal Next Hand</button>
    </div>

    <div id="hand-container"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        // --- 1. SUPABASE AUTHENTICATION ---
        const { createClient } = window.supabase;
        // IMPORTANT: Replace these with your actual Supabase URL and Anon Key
        const supabaseUrl = 'https://zlvqbzhfogwgnohrvouq.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpsdnFiemhmb2d3Z25vaHJ2b3VxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyNzQyNDAsImV4cCI6MjA5ODg1MDI0MH0.AiEu0SsqIramGUw6wNdtye0oovW6pa7veXoH6UQDM9I';
        const supabase = createClient(supabaseUrl, supabaseKey);

        async function checkAuthState() {
            const { data: { session } } = await supabase.auth.getSession();

            if (session) {
                // Logged in: Hide login, show lobby
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('lobby-screen').style.display = 'flex';

                const userEmail = session.user.email;
                console.log("Logged in as:", userEmail);

                // Alert the backend about the player's identity
                socket.emit('player_authenticated', { userId: session.user.id, email: userEmail });
            } else {
                // Not logged in: Show login, hide lobby
                document.getElementById('login-screen').style.display = 'flex';
                document.getElementById('lobby-screen').style.display = 'none';
            }
        }

        async function signInWithGoogle() {
            const { data, error } = await supabase.auth.signInWithOAuth({
                provider: 'google',
                options: { redirectTo: window.location.origin }
            });
            if (error) alert(error.message);
        }

        // --- 2. SOCKET CONNECTIONS ---
        const socket = io();

        // Check auth immediately once the page and socket load
        checkAuthState();

        let myPlayerIndex = null;
        let myHand = [];
        let isMyTurn = false;
        let currentBoard = [];
        let boardEnds = { head: null, tail: null };
        let previousBoardLength = 0;
        let currentPlayersReady = 0;

        // --- 3. SOUND ENGINE ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();

        function unlockAudio() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playWoodClack() {
            unlockAudio();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.6, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        }

        function playVictoryChime() {
            unlockAudio();
            [523.25, 659.25, 783.99].forEach((freq, i) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine'; osc.frequency.value = freq;
                gain.gain.setValueAtTime(0, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + 0.1);
                gain.gain.setTargetAtTime(0, audioCtx.currentTime + 0.1, 0.3);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(audioCtx.currentTime + (i * 0.1)); osc.stop(audioCtx.currentTime + 2);
            });
        }

        const dotPatterns = {
            0: [], 1: [5], 2: [1, 9], 3: [1, 5, 9], 4: [1, 3, 7, 9],
            5: [1, 3, 5, 7, 9], 6: [1, 3, 4, 6, 7, 9], 7: [1, 3, 4, 5, 6, 7, 9],
            8: [1, 2, 3, 4, 6, 7, 8, 9], 9: [1, 2, 3, 4, 5, 6, 7, 8, 9]
        };

        // --- 4. LOBBY ACTIONS ---
        function createRoom() {
            unlockAudio();
            socket.emit('create_room');
        }

        function joinRoom() {
            unlockAudio();
            const code = document.getElementById('room-code-input').value.toUpperCase().trim();
            if (code.length === 5) {
                socket.emit('join_room', code);
            } else {
                alert("Room code must be exactly 5 letters.");
            }
        }

        socket.on('room_joined', (data) => {
            document.getElementById('lobby-screen').style.display = 'none';
            document.getElementById('room-info-bar').style.display = 'block';
            document.getElementById('display-room-code').innerText = data.roomCode;
            myPlayerIndex = data.playerIndex;
        });

        socket.on('error_msg', (msg) => { alert(msg); });

        // --- 5. GAME LOGIC ---
        socket.on('game_update', (state) => {
            myHand = state.hand || [];
            isMyTurn = (state.currentTurn === myPlayerIndex);
            currentBoard = state.board;
            currentPlayersReady = state.playersReady;

            if (state.roomCode) document.getElementById('display-room-code').innerText = state.roomCode;
            if (state.playersReady) document.getElementById('display-player-count').innerText = state.playersReady;

            if (currentBoard.length > previousBoardLength) playWoodClack();
            previousBoardLength = currentBoard.length;

            if (currentBoard.length > 0) {
                boardEnds.head = currentBoard[0][0];
                boardEnds.tail = currentBoard[currentBoard.length - 1][1];
            }

            document.getElementById('score-t1').innerText = state.scores.team1;
            document.getElementById('score-t2').innerText = state.scores.team2;

            const myTeamClass = (myPlayerIndex === 0 || myPlayerIndex === 2) ? "t1-box" : "t2-box";
            const myTeamNum = (myPlayerIndex === 0 || myPlayerIndex === 2) ? 1 : 2;

            const statusText = document.getElementById('status-text');
            const passBtn = document.getElementById('pass-btn');
            const modal = document.getElementById('round-modal');

            if (state.playersReady < 4) {
                statusText.innerHTML = `Waiting for players... (${state.playersReady}/4)`;
                passBtn.style.display = "none";
                modal.style.display = 'none';
            }
            else if (state.matchWinner) {
                if (modal.style.display !== 'block') playVictoryChime();
                modal.style.display = 'block';
                document.getElementById('modal-title').innerText = "🏆 GAME OVER 🏆";
                document.getElementById('modal-msg').innerText = state.matchWinner + "\n(Loser reached 200 points)";
                document.getElementById('next-round-btn').style.display = 'none';
                passBtn.style.display = "none";
                statusText.innerText = "Match Concluded.";
            }
            else if (state.isRoundOver) {
                if (modal.style.display !== 'block') playVictoryChime();
                modal.style.display = 'block';
                document.getElementById('modal-title').innerText = "Round Over!";
                document.getElementById('modal-msg').innerText = state.roundMessage;
                passBtn.style.display = "none";
                statusText.innerText = "Waiting for next round...";
            }
            else {
                modal.style.display = 'none';
                if (isMyTurn) {
                    statusText.innerHTML = `You are Player ${myPlayerIndex} (<span class="${myTeamClass}">Team ${myTeamNum}</span>) - YOUR TURN!`;
                    passBtn.style.display = "inline-block";
                } else {
                    statusText.innerHTML = `You are Player ${myPlayerIndex} (<span class="${myTeamClass}">Team ${myTeamNum}</span>) - Waiting for Player ${state.currentTurn}...`;
                    passBtn.style.display = "none";
                }
            }

            renderHand();
            renderBoard(currentBoard);
        });

        function renderHand() {
            const handContainer = document.getElementById('hand-container');
            handContainer.innerHTML = '';
            myHand.forEach((tile, index) => {
                const dominoEl = createDominoElement(tile, 'vertical');

                if (isMyTurn && currentPlayersReady === 4) dominoEl.classList.add('playable');

                dominoEl.onclick = () => {
                    if (!isMyTurn || currentPlayersReady < 4) return;
                    unlockAudio();

                    if (currentBoard.length === 0) {
                        socket.emit('play_tile', { playerIndex: myPlayerIndex, tileIndex: index, target: 'tail' });
                        return;
                    }
                    const [a, b] = tile;
                    const matchesHead = (a === boardEnds.head || b === boardEnds.head);
                    const matchesTail = (a === boardEnds.tail || b === boardEnds.tail);

                    if (matchesHead && matchesTail) {
                        const playOnHead = confirm("This tile matches BOTH sides!\n\nClick OK to play on the LEFT (Head).\nClick Cancel to play on the RIGHT (Tail).");
                        const targetEnd = playOnHead ? 'head' : 'tail';
                        socket.emit('play_tile', { playerIndex: myPlayerIndex, tileIndex: index, target: targetEnd });
                    } else if (matchesHead) {
                        socket.emit('play_tile', { playerIndex: myPlayerIndex, tileIndex: index, target: 'head' });
                    } else if (matchesTail) {
                        socket.emit('play_tile', { playerIndex: myPlayerIndex, tileIndex: index, target: 'tail' });
                    }
                };
                handContainer.appendChild(dominoEl);
            });
        }

        function renderBoard(boardTiles) {
            const boardContainer = document.getElementById('the-board');
            const scrollContainer = document.getElementById('board-container');
            boardContainer.innerHTML = '';

            if (boardTiles.length === 0) return;

            const GAP = 4; const ROW_H = 85; const TILES_PER_ROW = 10;
            let positions = []; let cx = 0, cy = 0, dir = 1;

            for (let i = 0; i < boardTiles.length; i++) {
                let tile = boardTiles[i];
                let isDouble = (tile[0] === tile[1]);
                let w = isDouble ? 50 : 100;

                if (i > 0) {
                    if (i % TILES_PER_ROW === 0) { cy += ROW_H; dir *= -1; }
                    else { cx += dir * GAP; }
                }

                let drawX, flip;
                if (dir === 1) { drawX = cx; cx += w; flip = false; }
                else { cx -= w; drawX = cx; flip = true; }

                positions.push({ tile, x: drawX, y: cy, flip, isDouble });
            }

            let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
            positions.forEach(pos => {
                let w = pos.isDouble ? 50 : 100; let h = pos.isDouble ? 100 : 50;
                if (pos.x < minX) minX = pos.x; if (pos.x + w > maxX) maxX = pos.x + w;
                let topY = pos.isDouble ? pos.y - 25 : pos.y; let botY = topY + h;
                if (topY < minY) minY = topY; if (botY > maxY) maxY = botY;
            });

            const containerWidth = scrollContainer.clientWidth;
            const containerHeight = scrollContainer.clientHeight;
            let totalW = maxX - minX; let totalH = maxY - minY;

            let offsetX = 20 - minX;
            if (totalW < containerWidth - 40) offsetX = (containerWidth - totalW) / 2 - minX;

            let offsetY = 20 - minY;
            if (totalH < containerHeight - 40) offsetY = (containerHeight - totalH) / 2 - minY;

            positions.forEach(pos => {
                const dominoEl = createDominoElement(pos.tile, 'horizontal', pos.flip);
                dominoEl.style.position = 'absolute';
                dominoEl.style.left = `${pos.x + offsetX}px`;
                let finalY = pos.y + offsetY;
                if (pos.isDouble) finalY -= 25;
                dominoEl.style.top = `${finalY}px`;
                boardContainer.appendChild(dominoEl);
            });

            boardContainer.style.minWidth = `${totalW + 40}px`;
            boardContainer.style.minHeight = `${totalH + 40}px`;
            scrollContainer.scrollTo({
                top: (totalH + 40) / 2 - containerHeight / 2,
                left: (totalW + 40) / 2 - containerWidth / 2,
                behavior: 'smooth'
            });
        }

        function createDominoElement(tile, orientation = 'vertical', flip = false) {
            const div = document.createElement('div');
            div.className = `domino ${orientation}`;
            if (orientation === 'horizontal' && tile[0] === tile[1]) div.classList.add('double-tile');

            function createPipFace(num) {
                const face = document.createElement('div'); face.className = 'pip-face';
                dotPatterns[num].forEach(pos => {
                    const dot = document.createElement('div'); dot.className = 'dot';
                    const row = Math.ceil(pos / 3); const col = ((pos - 1) % 3) + 1;
                    dot.style.gridArea = `${row} / ${col}`; face.appendChild(dot);
                });
                return face;
            }

            const topHalf = createPipFace(flip ? tile[1] : tile[0]);
            const bottomHalf = createPipFace(flip ? tile[0] : tile[1]);

            if (orientation === 'horizontal' && tile[0] === tile[1]) {
                div.appendChild(topHalf);
                div.appendChild(Object.assign(document.createElement('div'), { className: 'divider-line', style: 'width: 80%; height: 2px; margin: 5px 0;' }));
                div.appendChild(bottomHalf);
            } else {
                div.appendChild(topHalf);
                div.appendChild(Object.assign(document.createElement('div'), { className: 'divider-line' }));
                div.appendChild(bottomHalf);
            }
            return div;
        }

        function passTurn() {
            if (isMyTurn) {
                unlockAudio();
                socket.emit('pass_turn', { playerIndex: myPlayerIndex });
            }
        }

        function requestNextRound() {
            previousBoardLength = 0;
            socket.emit('next_round');
        }
    </script>
</body>
</html>
